ctxCssImport: true
inlineAllStyles: true
widthsContexts:
  - name: main
    max: 80rem
    prose: 50rem
fontStacksContexts:
  - name: main
    body:
      native: rounded-sans
      custom: Quicksand
    heading:
      native: rounded-sans
      custom: Quicksand
    code:
      native: monospace-code
customFontsImport:
  - name: Quicksand
    source:
      type: fontsource
      name: Quicksand
      weights:
        - "400"
        - "500"
        - "600"
        - "700"
        - "100"
        - "200"
        - "300"
        - "800"
        - "900"
      styles:
        - normal
      subsets:
        - latin
typeScales:
  - name: main
    minFontSize: 18
    maxFontSize: 20
    minTypeScale: 1.2
    maxTypeScale: 1.25
colors:
  - name: vermilion
    value: "#de3831"
  - name: orange-peel
    value: "#ffa02f"
  - name: burnt-umber
    value: "#802d25"
  - name: copper
    value: "#a97433"
  - name: delft-blue
    value: "#343d63"
  - name: ylnmn-blue
    value: "#4c5792"
  - name: gray
    value: "#807973"
  - name: silver
    value: "#b7b1a9"
  - name: timberwolf
    value: "#e0ded8"
  - name: white
    value: "#ffffff"
